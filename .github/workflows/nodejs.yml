name: Server tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install server dependencies
        working-directory: ./server
        run: |
          npm ci
      - name: Run server tests
        working-directory: ./server
        run: |
          npm test
